var activeQuestions = [];
var qIndex = 0;
var score = 0;
var wrong = [];
var locked = false;
var currentMode = "";

function esc(s){
  return String(s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function ansText(a){return Array.isArray(a)?a.join(", "):a;}
function sameArrays(a,b){
  if(a.length!==b.length)return false;
  var aa=a.slice().sort(), bb=b.slice().sort();
  for(var i=0;i<aa.length;i++) if(aa[i]!==bb[i]) return false;
  return true;
}
function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t;}
  return a;
}
function countQuiz(source){
  return allQuestions.filter(function(q){return q.source===source;}).length;
}
function home(){
  var html='<div class="card"><h1>EA Quiz Hub</h1><p>Choose one quiz to study, or start a 60-question random practice quiz from all 4 quizzes.</p>';
  html += '<button onclick="startSourceQuiz(\'Quiz 1\')">Quiz 1<br><span class="small">'+countQuiz('Quiz 1')+' questions</span></button>';
  html += '<button onclick="startSourceQuiz(\'Quiz 2\')">Quiz 2<br><span class="small">'+countQuiz('Quiz 2')+' questions</span></button>';
  html += '<button onclick="startSourceQuiz(\'Quiz 3\')">Quiz 3<br><span class="small">'+countQuiz('Quiz 3')+' questions</span></button>';
  html += '<button onclick="startSourceQuiz(\'Quiz 4\')">Quiz 4<br><span class="small">'+countQuiz('Quiz 4')+' questions</span></button>';
  html += '<button onclick="startRandom60()">Random 60 Questions<br><span class="small">Mixed from all 4 quizzes</span></button>';
  html += '<p class="small">Total question bank: '+allQuestions.length+' questions.</p></div>';
  document.getElementById('app').innerHTML=html;
}
function startSourceQuiz(source){
  currentMode=source;
  activeQuestions=allQuestions.filter(function(q){return q.source===source;});
  start();
}
function startRandom60(){
  currentMode="Random 60";
  activeQuestions=shuffle(allQuestions).slice(0,60);
  start();
}
function start(){
  qIndex=0; score=0; wrong=[]; locked=false; showQuestion();
}
function showQuestion(){
  locked=false;
  var q=activeQuestions[qIndex];
  var type=q.multi?'checkbox':'radio';
  var progress=Math.round((qIndex/activeQuestions.length)*100);
  var html='<div class="card">';
  html+='<span class="source">'+esc(q.source)+'</span>';
  html+='<h2>Question '+(qIndex+1)+' of '+activeQuestions.length+'</h2>';
  html+='<div class="barOuter"><div class="barInner" style="width:'+progress+'%"></div></div>';
  html+='<h3>'+esc(q.q)+'</h3>';
  if(q.multi) html+='<p><b>Select all that apply.</b></p>';
  for(var i=0;i<q.o.length;i++){
    html+='<div class="choice"><label><input type="'+type+'" name="ans" value="'+esc(q.o[i])+'"><span>'+esc(q.o[i])+'</span></label></div>';
  }
  html+='<button onclick="submitAnswer()">Submit Answer</button>';
  html+='<button class="light" onclick="home()">Back to Menu</button>';
  html+='<div id="feedback"></div></div>';
  document.getElementById('app').innerHTML=html;
  window.scrollTo(0,0);
}
function submitAnswer(){
  if(locked)return;
  var q=activeQuestions[qIndex];
  var nodes=document.querySelectorAll('input[name="ans"]:checked');
  if(nodes.length===0){alert('Please select an answer.');return;}
  var selected=[];
  for(var i=0;i<nodes.length;i++) selected.push(nodes[i].value);
  var correct=q.multi?sameArrays(selected,q.a):selected[0]===q.a;
  var fb=document.getElementById('feedback');
  if(correct){
    score++;
    fb.innerHTML='<div class="review"><p class="good">Correct!</p><button onclick="nextQ()">Next Question</button></div>';
  } else {
    wrong.push({num:qIndex+1,source:q.source,question:q.q,your:selected.join(", "),correct:ansText(q.a)});
    fb.innerHTML='<div class="review"><p class="bad">Incorrect.</p><p><b>Correct answer:</b> '+esc(ansText(q.a))+'</p><button onclick="nextQ()">Next Question</button></div>';
  }
  locked=true;
}
function nextQ(){
  qIndex++;
  if(qIndex>=activeQuestions.length) finish();
  else showQuestion();
}
function finish(){
  var percent=Math.round((score/activeQuestions.length)*100);
  var html='<div class="card"><h1>'+esc(currentMode)+' Score: '+score+' / '+activeQuestions.length+' ('+percent+'%)</h1><h2>Wrong Answer Review</h2>';
  if(wrong.length===0){
    html+='<p class="good">Perfect score. No wrong answers.</p>';
  } else {
    for(var i=0;i<wrong.length;i++){
      html+='<div class="missed"><span class="source">'+esc(wrong[i].source)+'</span><br>';
      html+='<b>Question '+wrong[i].num+'</b><p>'+esc(wrong[i].question)+'</p>';
      html+='<p><b>Your answer:</b> '+esc(wrong[i].your)+'</p>';
      html+='<p><b>Correct answer:</b> '+esc(wrong[i].correct)+'</p></div>';
    }
  }
  if(currentMode==="Random 60") html+='<button onclick="startRandom60()">Start New Random 60</button>';
  else html+='<button onclick="startSourceQuiz(\''+currentMode+'\')">Retake '+esc(currentMode)+'</button>';
  html+='<button class="light" onclick="home()">Back to Menu</button></div>';
  document.getElementById('app').innerHTML=html;
  window.scrollTo(0,0);
}
home();
</script>
</body>
</html>
