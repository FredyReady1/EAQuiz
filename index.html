<style>
body{font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;margin:0;background:#f2f4f7;color:#111;}
.wrap{padding:16px;max-width:800px;margin:auto;}
.card{background:white;border-radius:14px;padding:18px;box-shadow:0 2px 10px #0001;margin-top:12px;}

button.light{background:#e5e7eb;color:#111;}
.choice{border:1px solid #d1d5db;border-radius:12px;padding:13px;margin:10px 0;background:#fff;}
.choice label{display:flex;gap:10px;line-height:1.35;}
input{transform:scale(1.25);}
.good{color:#067a2f;font-weight:bold;}
.bad{color:#b42318;font-weight:bold;}
.small{color:#555;font-size:14px;}
.review{border-top:1px solid #ddd;padding-top:10px;margin-top:10px;}
.missed{border:1px solid #ddd;border-radius:10px;padding:12px;margin:10px 0;background:#fafafa;}
</style>

, {"q": "Which of the following is an advantage of container?", "o": ["Agility", "Application density", "Security", "Stability"], "a": "Application density"}, {"q": "In Kubernetes, a node is:", "o": ["A tool for starting a Kubernetes cluster on a local machine", "A worker machine", "A machine that coordinates scheduling and management", "A machine where node components are installed"], "a": "A worker machine"}, {"q": "What are the benefits of Virtualization?", "o": ["Isolation", "Encapsulation", "Hardware Independence, Portability", "Hardware Independence, Portability, Encapsulation, Isolation"], "a": "Hardware Independence, Portability, Encapsulation, Isolation"}, {"q": "Which type of Hypervisor allows the VMs to directly interface with the hardware?", "o": ["Type 1", "Type 2", "Type 3", "Type 4"], "a": "Type 1"}, {"q": "What happens when you enter exit command inside a standard docker container?", "o": ["Disconnected but container continues", "Application stops but container remains", "Disconnected and container stops", "Nothing happens"], "a": "Disconnected and container stops"}, {"q": "Which of these is not a container runtime?", "o": ["Docker", "RKT", "Elastic Container Registry", "CRI-O"], "a": "Elastic Container Registry"}, {"q": "Which type of Hypervisor are VMWare Workstation, VirtualBox, KVM?", "o": ["Type 1", "Type 2", "Type 3", "Type 4"], "a": "Type 2"}, {"q": "What is OS Virtualization?", "o": ["Multiple hard disks create one logical disk", "Software to run multiple OS on same hardware", "Software/hardware to emulate a network", "Hard disk expands memory"], "a": "Software to run multiple OS on same hardware"}, {"q": "What command can be used to get the system-wide Docker Configuration?", "o": ["docker system dump", "docker status", "docker ls", "docker info"], "a": "docker info"}, {"q": "What is a Virtual Machine - VM?", "o": ["A computer that can run multiple Operating Systems", "A software computer created using OS Virtualization", "A software network created using Network Virtualization", "All of the above"], "a": "A software computer created using OS Virtualization"}, {"q": "What is the difference between Docker and K8S?", "o": ["Docker runtime, K8S orchestration", "Docker orchestration, K8S runtime", "Both runtimes", "Both orchestration"], "a": "Docker runtime, K8S orchestration"}, {"q": "What is TRUE regarding the Dockerfile?", "o": ["Docker File is YAML based", "Docker File contains instructions to assemble a docker image", "EXPOSE exposes container to internet", "CMD sets environment variables"], "a": "Docker File contains instructions to assemble a docker image"}, {"q": "What are some different examples of Virtualization?", "o": ["Virtual Memory", "Virtual Storage", "Virtual Network", "ALL of the above"], "a": "ALL of the above"}, {"q": "In MVC Web application, what receives the request?", "o": ["Model", "Controller", "View", "Both Controller and Model"], "a": "Controller"}, {"q": "What is a cloud-hosted service from Docker that provides registry capabilities?", "o": ["Docker Swarm", "Docker Hub", "Docker Cloud", "Docker Compose"], "a": "Docker Hub"}, {"q": "The API documentation should be designed for:", "o": ["The business decision maker", "The end-user", "The developer", "A file extension"], "a": "The developer"}, {"q": "docker exec -it container_id bash is used to:", "o": ["Activate default VM machine", "Access a running container", "Build an image", "Commit changes"], "a": "Access a running container"}, {"q": "Which type of Hypervisor runs directly on the hardware?", "o": ["Type 1", "Type 2", "Type 3", "Type 4"], "a": "Type 1"}, {"q": "What is a text document that contains all the commands to assemble an image?", "o": ["Docker Cloud", "Docker Kitematic", "Dockerfile", "Docker Compose"], "a": "Dockerfile"}, {"q": "What docker command can be used to view disk usage?", "o": ["docker top", "docker system status", "docker system df", "docker info"], "a": "docker system df"}, {"q": "Which of the following is an advantage of a virtual machine hosted on a PC?", "o": ["VM hosts programs physical machine cannot", "Easier OS install", "VM hosts programs physical machine cannot", "Test changes without affecting host PC"], "a": "Test changes without affecting host PC"}, {"q": "MVC is a:", "o": ["Framework", "Design Pattern", "Java Library", "Collection of Java Utilities"], "a": "Design Pattern"}, {"q": "What is the sequence of call in case of push to MVC?", "o": ["Controller -> Model -> View", "Model -> Controller -> View", "View -> Controller -> Model", "Controller -> View -> Model"], "a": "View -> Controller -> Model"}]}, {"title": "Quiz 3 - Security", "questions": [{"q": "How does malicious input flow in a DOM-based XSS?", "o": ["From Server to Client", "From Client to Server", "From Attacker to Server", "From Victim to Server"], "a": "From Client to Server"}, {"q": "What flaw can lead to exposure of resources or functionality to unintended actors?", "o": ["Session Fixation", "Improper Authentication", "Insecure Cryptographic Storage", "Invalidated Redirects and Forwards"], "a": "Improper Authentication"}, {"q": "Which of the following consequences is most likely to occur due to an injection attack?", "o": ["Spoofing", "Cross-Site Request Forgery", "Denial Of Service", "Insecure Direct Object Reference"], "a": "Denial Of Service"}, {"q": "What is a small amount of text that helps a website track information about a user across multiple pages?", "o": ["HTTP cookie", "SSL cookie", "HTTPS cookie", "TCP IP cookie"], "a": "HTTP cookie"}, {"q": "Which character is most likely to be used for an SQL injection attack?", "o": ["Single quote (')", "Null byte", "Less than sign (<)", "Greater than sign (>)"], "a": "Single quote (')"}, {"q": "What type of flaw occurs when untrusted user data is sent to the interpreter as part of a query or command?", "o": ["Insecure Direct Object References", "Injection", "Cross Site Request Forgery", "Insufficient Transport Layer Protection"], "a": "Injection"}, {"q": "What flaw can lead to exposure of resources or functionality to unintended actors?", "o": ["Session Fixation", "Improper Authentication", "Insecure Cryptographic Storage", "Invalidated Redirects and Forwards"], "a": "Improper Authentication"}, {"q": "Which threat occurs when a POST parameter performs an operation on behalf of a user without checking a shared secret?", "o": ["Cross Site Request Forgery", "Insecure Direct Object Reference", "Cross Site Scripting", "Injection"], "a": "Cross Site Request Forgery"}, {"q": "You can allow client side scripts to execute in the browsers for needed operations.", "o": ["True", "False"], "a": "True"}, {"q": "What attack exploits the trust that a site has in a user's browser?", "o": ["Session Hijacking", "Cross-Site Request Forgery", "SQL injection", "Cross-Site Scripting"], "a": "Cross-Site Request Forgery"}, {"q": "Which functionalities should you include in an authentication and session management system? Select all that apply.", "o": ["Logout Functionality", "Inactivity Time-out functionality", "Escaping Functionality", "Forwarding System Functionality"], "a": ["Logout Functionality", "Inactivity Time-out functionality"], "multi": true}, {"q": "What is phishing?", "o": ["Data Transfer Protocol", "Email Scam", "Network Scandal", "Cross Domain Scam"], "a": "Email Scam"}, {"q": "Using an unpredictable token for each user on state-changing links/forms can prevent what attack?", "o": ["OS Commanding", "Cross-site Scripting", "Cross-site Request Forgery", "Cross-site tracing"], "a": "Cross-site Request Forgery"}, {"q": "Which attack can execute scripts in the user's browser and hijack sessions, deface websites, or redirect users?", "o": ["SQL injection", "Cross Site Scripting", "Malware Uploading", "Man in the Middle"], "a": "Cross Site Scripting"}, {"q": "What is a collection of computers that are all infected by the same malware?", "o": ["botnet", "malware", "adware", "spyware"], "a": "botnet"}, {"q": "What is it called when a co-worker looks your way when you enter your user ID and password?", "o": ["phishing", "social engineering", "shoulder surfing", "coincidence"], "a": "shoulder surfing"}, {"q": "Why should you use CAPTCHA?", "o": ["To create cryptographically random session IDs", "To protect credentials by using encryption or cryptographic salt and hash", "To protect authentication systems from automated or brute-force attacks", "To ensure inactivity timeout functionality"], "a": "To protect authentication systems from automated or brute-force attacks"}, {"q": "Which attack occurs when malicious input is sent to a server and the server echoes it back to the client?", "o": ["Reflected XSS", "Persistent XSS", "Insecure Direct Object Reference", "Failure to Restrict URLs"], "a": "Reflected XSS"}, {"q": "Which threat is most likely caused by poor input validation?", "o": ["Enabling of IPSec", "Insecure direct object reference", "Insufficient transport layer protection", "Insecure cryptographic storage"], "a": "Insecure direct object reference"}, {"q": "How does malicious input flow in a DOM-based XSS?", "o": ["From Server to Client", "From Client to Server", "From Attacker to Server", "From Victim to Server"], "a": "From Client to Server"}]}];
var quizIndex = -1;
var qIndex = 0;
var score = 0;
var wrong = [];
var locked = false;

function esc(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function ansText(a) {
  return Array.isArray(a) ? a.join(", ") : a;
}

function sameArrays(a,b) {
  if(a.length !== b.length) return false;
  var aa = a.slice().sort();
  var bb = b.slice().sort();
  for(var i=0;i<aa.length;i++) if(aa[i] !== bb[i]) return false;
  return true;
}

function home() {
  var html = '<div class="card"><h1>Quiz Hub</h1><p>Choose the quiz you want to study.</p>';
  for(var i=0;i<quizzes.length;i++) {
    html += '<button onclick="startQuiz('+i+')">'+esc(quizzes[i].title)+'<br><span class="small">'+quizzes[i].questions.length+' questions</span></button>';
  }
  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

function startQuiz(i) {
  quizIndex = i;
  qIndex = 0;
  score = 0;
  wrong = [];
  locked = false;
  showQuestion();
}

function showQuestion() {
  locked = false;
  var quiz = quizzes[quizIndex];
  var q = quiz.questions[qIndex];
  var type = q.multi ? 'checkbox' : 'radio';
  var html = '<div class="card">';
  html += '<div class="small">'+esc(quiz.title)+'</div>';
  html += '<h2>Question '+(qIndex+1)+' of '+quiz.questions.length+'</h2>';
  html += '<h3>'+esc(q.q)+'</h3>';
  if(q.multi) html += '<p><b>Select all that apply.</b></p>';
  for(var i=0;i<q.o.length;i++) {
    html += '<div class="choice"><label><input type="'+type+'" name="ans" value="'+esc(q.o[i])+'"><span>'+esc(q.o[i])+'</span></label></div>';
  }
  html += '<button onclick="submitAnswer()">Submit Answer</button>';
  html += '<button class="light" onclick="home()">Back to Quiz Menu</button>';
  html += '<div id="feedback"></div></div>';
  document.getElementById('app').innerHTML = html;
}

function submitAnswer() {
  if(locked) return;
  var quiz = quizzes[quizIndex];
  var q = quiz.questions[qIndex];
  var nodes = document.querySelectorAll('input[name="ans"]:checked');
  if(nodes.length === 0) {
    alert('Please select an answer.');
    return;
  }
  var selected = [];
  for(var i=0;i<nodes.length;i++) selected.push(nodes[i].value);
  var correct = q.multi ? sameArrays(selected, q.a) : selected[0] === q.a;
  var fb = document.getElementById('feedback');
  if(correct) {
    score++;
    fb.innerHTML = '<div class="review"><p class="good">Correct!</p><button onclick="nextQ()">Next Question</button></div>';
  } else {
    wrong.push({num:qIndex+1, question:q.q, your:selected.join(", "), correct:ansText(q.a)});
    fb.innerHTML = '<div class="review"><p class="bad">Incorrect.</p><p><b>Correct answer:</b> '+esc(ansText(q.a))+'</p><button onclick="nextQ()">Next Question</button></div>';
  }
  locked = true;
}

function nextQ() {
  qIndex++;
  if(qIndex >= quizzes[quizIndex].questions.length) finish();
  else showQuestion();
}

function finish() {
  var quiz = quizzes[quizIndex];
  var percent = Math.round((score / quiz.questions.length) * 100);
  var html = '<div class="card"><div class="small">'+esc(quiz.title)+'</div>';
  html += '<h1>Final Score: '+score+' / '+quiz.questions.length+' ('+percent+'%)</h1>';
  html += '<h2>Wrong Answer Review</h2>';
  if(wrong.length === 0) {
    html += '<p class="good">Perfect score. No wrong answers.</p>';
  } else {
    for(var i=0;i<wrong.length;i++) {
      html += '<div class="missed"><b>Question '+wrong[i].num+'</b><p>'+esc(wrong[i].question)+'</p><p><b>Your answer:</b> '+esc(wrong[i].your)+'</p><p><b>Correct answer:</b> '+esc(wrong[i].correct)+'</p></div>';
    }
  }
  html += '<button onclick="startQuiz('+quizIndex+')">Retake This Quiz</button>';
  html += '<button class="light" onclick="home()">Back to Quiz Menu</button></div>';
  document.getElementById('app').innerHTML = html;
}

home();
</script>
